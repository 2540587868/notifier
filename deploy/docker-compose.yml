version: "3"
services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
      - "0.0.0.0:6099:6099"
    environment:
      - NAPCAT_UID=0
      - NAPCAT_GID=0
    volumes:
      - ./config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
